name: Bug report
description: Report something broken in Persistent Sage
title: "[Bug] "
labels: ["bug", "beta-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Persistent Sage. Do not paste API keys, private chats, Memory Anchors, or sensitive personal information.
  - type: input
    id: version
    attributes:
      label: Persistent Sage version
      description: Find this in Settings > General > About.
      placeholder: "0.2.0-beta.6"
    validations:
      required: true
  - type: dropdown
    id: install-type
    attributes:
      label: Install type
      options:
        - Windows installer
        - Portable zip
        - Built from source
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider and model
      placeholder: "OpenAI gpt-4o-mini, Gemini 2.5 Flash, local Ollama, etc."
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Screenshots or sanitized logs
      description: Optional. Redact secrets and private conversation content.
