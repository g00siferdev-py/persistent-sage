# Build Persistent Sage for Windows on GitHub-hosted runners (no local RAM/NSIS needed).
#
# Triggers:
#   - Actions → "Build Windows" → Run workflow (any branch)
#   - Push a version tag, e.g. v0.2.0-beta.4 → build + draft GitHub Release
#
# Repo settings: Settings → Actions → General → Workflow permissions →
#   "Read and write permissions" (required for tag releases).

name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (NSIS installer + exe)
        run: npm run tauri build -- --bundles nsis
        env:
          # Safer on shared runners; omit to use default parallelism.
          CARGO_BUILD_JOBS: 2

      - name: Package portable folder
        run: npm run package:portable

      - name: Zip portable package
        shell: pwsh
        run: |
          if (Test-Path dist/PersistentSagePortable.zip) { Remove-Item dist/PersistentSagePortable.zip }
          Compress-Archive -Path dist/PersistentSagePortable/* -DestinationPath dist/PersistentSagePortable.zip

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: persistent-sage-windows-${{ github.sha }}
          retention-days: 30
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/persistent-sage.exe
            dist/PersistentSagePortable.zip

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            dist/PersistentSagePortable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
