# Build a Microsoft Store MSIX package on GitHub-hosted Windows runners.
#
# Runs on every push to `main` (same code as `store-msix`, kept in sync by
# sync-store-msix.yml). Does not publish a GitHub Release or affect the NSIS updater.

name: Build MSIX

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: build-msix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-msix:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup WinApp CLI
        uses: microsoft/setup-WinAppCli@v0.1

      - name: Install frontend dependencies
        run: npm ci

      - name: Build MSIX package
        run: npm run msix:pack
        env:
          CARGO_BUILD_JOBS: 2

      - name: List generated package
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -File -Include *.msix,*.msixbundle,*.appx,*.appxbundle |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: persistent-sage-msix-${{ github.sha }}
          retention-days: 30
          if-no-files-found: error
          path: PersistentSage_0.2.8.0_x64.msix
